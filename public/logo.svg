<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" width="480" height="110">
  <!-- Fondo blanco -->
  <rect width="480" height="110" fill="#ffffff"/>

  <!-- Línea de base del texto: y=58 -->

  <!-- "esencia" — serif fino, rosa empolvado -->
  <text
    x="12"
    y="58"
    font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', 'Cormorant Garamond', Georgia, serif"
    font-size="42"
    font-weight="400"
    font-style="normal"
    fill="#C9907A"
    letter-spacing="-0.5"
  >esencia</text>

  <!-- "de" — ligeramente más oscuro y cursiva, para diferenciar -->
  <text
    x="192"
    y="58"
    font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', 'Cormorant Garamond', Georgia, serif"
    font-size="42"
    font-weight="400"
    font-style="italic"
    fill="#A06050"
    letter-spacing="-0.5"
  >de</text>

  <!-- "belleza" — igual que esencia -->
  <text
    x="228"
    y="58"
    font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', 'Cormorant Garamond', Georgia, serif"
    font-size="42"
    font-weight="400"
    font-style="normal"
    fill="#C9907A"
    letter-spacing="-0.5"
  >belleza</text>

  <!-- ".es" — mismo estilo -->
  <text
    x="378"
    y="58"
    font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', 'Cormorant Garamond', Georgia, serif"
    font-size="42"
    font-weight="400"
    font-style="normal"
    fill="#C9907A"
    letter-spacing="-0.5"
  >.es</text>

  <!-- Icono: frasco de perfume + flor de loto (posición a la derecha del texto) -->
  <g transform="translate(430, 8)" fill="none" stroke="#C9907A" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pétalos flor de loto / rosa encima del frasco -->
    <!-- Pétalo central izquierdo -->
    <path d="M22 20 C20 13, 15 11, 14 6 C15 12, 18 14, 22 16" stroke-width="1.3" fill="#C9907A" fill-opacity="0.15"/>
    <!-- Pétalo central -->
    <path d="M22 20 C22 12, 22 9, 22 5 C22 9, 22 12, 22 16" stroke-width="1.3" fill="#C9907A" fill-opacity="0.15"/>
    <!-- Pétalo central derecho -->
    <path d="M22 20 C24 13, 29 11, 30 6 C29 12, 26 14, 22 16" stroke-width="1.3" fill="#C9907A" fill-opacity="0.15"/>
    <!-- Pétalo izquierdo exterior -->
    <path d="M22 22 C17 17, 11 17, 8 13 C12 17, 16 19, 22 20" stroke-width="1.1" fill="#C9907A" fill-opacity="0.1"/>
    <!-- Pétalo derecho exterior -->
    <path d="M22 22 C27 17, 33 17, 36 13 C32 17, 28 19, 22 20" stroke-width="1.1" fill="#C9907A" fill-opacity="0.1"/>

    <!-- Cuello del frasco (fino) -->
    <rect x="18" y="20" width="8" height="7" rx="1" stroke-width="1.3" fill="#ffffff"/>
    <!-- Tapón rectangular elegante -->
    <rect x="16.5" y="15" width="11" height="6" rx="1.5" stroke-width="1.3" fill="#ffffff"/>

    <!-- Cuerpo del frasco (redondeado, tipo atomizador clásico) -->
    <path d="M12 27 Q10 27, 10 30 L10 52 Q10 56, 14 56 L30 56 Q34 56, 34 52 L34 30 Q34 27, 32 27 Z"
      stroke-width="1.3" fill="#ffffff"/>

    <!-- Línea decorativa en el cuerpo -->
    <line x1="14" y1="38" x2="30" y2="38" stroke-width="0.8" opacity="0.7"/>

    <!-- Pequeña etiqueta ovalada -->
    <ellipse cx="22" cy="45" rx="7" ry="5" stroke-width="0.9" opacity="0.6"/>
  </g>

  <!-- Descriptor centrado debajo -->
  <text
    x="230"
    y="82"
    font-family="'Raleway', 'Gill Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="300"
    fill="#C9907A"
    letter-spacing="2.8"
    text-anchor="middle"
    opacity="0.9"
  >Peluquería • Estética • Perfumes</text>
</svg>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&amp;family=Raleway:wght@300&amp;display=swap');
    </style>
  </defs>

  <!-- Fondo blanco -->
  <rect width="520" height="120" fill="#ffffff"/>

  <!-- Texto principal: esenciade -->
  <text
    x="22"
    y="68"
    font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
    font-size="52"
    font-weight="600"
    fill="#E6C1B9"
    letter-spacing="1.5"
  >esenciade</text>

  <!-- Texto: belleza -->
  <text
    x="22"
    y="68"
    font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
    font-size="52"
    font-weight="600"
    fill="#E6C1B9"
    letter-spacing="1.5"
    dx="272"
  >belleza</text>

  <!-- Texto: .es -->
  <text
    x="22"
    y="68"
    font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
    font-size="52"
    font-weight="600"
    fill="#E6C1B9"
    letter-spacing="1.5"
    dx="484"
  >.es</text>

  <!-- Icono integrado: frasco de perfume + flor de loto (al final de .es, posición ~490, y~30) -->
  <g transform="translate(484, 6) scale(0.82)" fill="none" stroke="#E6C1B9" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pétalos de loto (flor superior) -->
    <path d="M20 18 C18 10, 12 8, 12 2 C12 8, 6 10, 4 18"/>
    <path d="M20 18 C22 11, 27 10, 30 6 C26 12, 26 16, 20 18"/>
    <path d="M20 18 C14 12, 10 13, 8 9 C11 14, 14 16, 20 18"/>
    <!-- Cuerpo del frasco -->
    <rect x="13" y="18" width="14" height="18" rx="2"/>
    <!-- Cuello del frasco -->
    <rect x="16" y="13" width="8" height="6" rx="1"/>
    <!-- Tapón -->
    <rect x="17.5" y="10" width="5" height="4" rx="1"/>
    <!-- Línea decorativa en el frasco -->
    <line x1="16" y1="26" x2="24" y2="26" stroke-width="0.8"/>
    <!-- Base del frasco con extensión curva (la tilde que se transforma) -->
    <path d="M13 36 Q10 40, 6 42 Q14 41, 20 38 Q26 41, 34 42 Q30 40, 27 36" stroke-width="1.2"/>
  </g>

  <!-- Línea separadora decorativa -->
  <line x1="160" y1="82" x2="360" y2="82" stroke="#E6C1B9" stroke-width="0.6" opacity="0.5"/>

  <!-- Descriptor: Peluquería • Estética • Perfumes -->
  <text
    x="260"
    y="100"
    font-family="'Raleway', 'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    font-weight="300"
    fill="#E6C1B9"
    letter-spacing="3.5"
    text-anchor="middle"
    opacity="0.85"
  >PELUQUERÍA  •  ESTÉTICA  •  PERFUMES</text>
</svg>

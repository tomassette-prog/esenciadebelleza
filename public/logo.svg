<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&amp;family=Raleway:wght@300&amp;display=swap');
    </style>
  </defs>

  <!-- Fondo blanco -->
  <rect width="520" height="120" fill="#ffffff"/>

  <!-- Texto principal: esenciade -->
  <text
    x="22"
    y="68"
    font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
    font-size="52"
    font-weight="600"
    fill="#E6C1B9"
    letter-spacing="1.5"
  >esenciade</text>

  <!-- Texto: belleza -->
  <text
    x="22"
    y="68"
    font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
    font-size="52"
    font-weight="600"
    fill="#E6C1B9"
    letter-spacing="1.5"
    dx="272"
  >belleza</text>

  <!-- Texto: .es -->
  <text
    x="22"
    y="68"
    font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
    font-size="52"
    font-weight="600"
    fill="#E6C1B9"
    letter-spacing="1.5"
    dx="484"
  >.es</text>

  <!-- Icono integrado: frasco de perfume + flor de loto (al final de .es, posición ~490, y~30) -->
  <g transform="translate(484, 6) scale(0.82)" fill="none" stroke="#E6C1B9" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pétalos de loto (flor superior) -->
    <path d="M20 18 C18 10, 12 8, 12 2 C12 8, 6 10, 4 18"/>
    <path d="M20 18 C22 11, 27 10, 30 6 C26 12, 26 16, 20 18"/>
    <path d="M20 18 C14 12, 10 13, 8 9 C11 14, 14 16, 20 18"/>
    <!-- Cuerpo del frasco -->
    <rect x="13" y="18" width="14" height="18" rx="2"/>
    <!-- Cuello del frasco -->
    <rect x="16" y="13" width="8" height="6" rx="1"/>
    <!-- Tapón -->
    <rect x="17.5" y="10" width="5" height="4" rx="1"/>
    <!-- Línea decorativa en el frasco -->
    <line x1="16" y1="26" x2="24" y2="26" stroke-width="0.8"/>
    <!-- Base del frasco con extensión curva (la tilde que se transforma) -->
    <path d="M13 36 Q10 40, 6 42 Q14 41, 20 38 Q26 41, 34 42 Q30 40, 27 36" stroke-width="1.2"/>
  </g>

  <!-- Línea separadora decorativa -->
  <line x1="160" y1="82" x2="360" y2="82" stroke="#E6C1B9" stroke-width="0.6" opacity="0.5"/>

  <!-- Descriptor: Peluquería • Estética • Perfumes -->
  <text
    x="260"
    y="100"
    font-family="'Raleway', 'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    font-weight="300"
    fill="#E6C1B9"
    letter-spacing="3.5"
    text-anchor="middle"
    opacity="0.85"
  >PELUQUERÍA  •  ESTÉTICA  •  PERFUMES</text>
</svg>

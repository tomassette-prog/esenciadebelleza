<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo blanco con esquinas redondeadas -->
  <rect width="512" height="512" rx="90" fill="#ffffff"/>

  <!-- Icono centrado: frasco de perfume + flor tipo rosa/loto encima -->
  <g transform="translate(256,256) scale(7)" fill="none" stroke="#C9907A" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.4">
    <!-- Pétalos de la flor (loto/rosa) sobre el frasco -->
    <path d="M0 -32 C-1 -40, -6 -42, -7 -48 C-5 -41, -1 -38, 0 -33" fill="#C9907A" fill-opacity="0.2"/>
    <path d="M0 -32 C1 -40, 6 -42, 7 -48 C5 -41, 1 -38, 0 -33" fill="#C9907A" fill-opacity="0.2"/>
    <path d="M0 -32 C0 -41, 0 -44, 0 -50 C0 -44, 0 -41, 0 -33" fill="#C9907A" fill-opacity="0.2"/>
    <path d="M0 -30 C-5 -36, -12 -35, -15 -40 C-11 -34, -6 -32, 0 -30" fill="#C9907A" fill-opacity="0.15" stroke-width="1.1"/>
    <path d="M0 -30 C5 -36, 12 -35, 15 -40 C11 -34, 6 -32, 0 -30" fill="#C9907A" fill-opacity="0.15" stroke-width="1.1"/>

    <!-- Tapón -->
    <rect x="-7" y="-30" width="14" height="8" rx="2" fill="#ffffff"/>
    <!-- Cuello -->
    <rect x="-5" y="-22" width="10" height="8" rx="1" fill="#ffffff"/>

    <!-- Cuerpo del frasco redondeado -->
    <path d="M-14 -14 Q-17 -14, -17 -10 L-17 16 Q-17 20, -13 20 L13 20 Q17 20, 17 16 L17 -10 Q17 -14, 14 -14 Z"
      fill="#ffffff"/>

    <!-- Línea decorativa -->
    <line x1="-11" y1="0" x2="11" y2="0" stroke-width="0.8" opacity="0.7"/>

    <!-- Etiqueta ovalada -->
    <ellipse cx="0" cy="10" rx="8" ry="6" stroke-width="0.9" opacity="0.65"/>
  </g>
</svg>
